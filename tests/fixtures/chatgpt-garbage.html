<div class="flex flex-col text-sm">
    <!-- User message -->
    <div data-message-author-role="user" class="message-container">
        <div class="message-content">
            Hello
        </div>
    </div>
    
    <!-- Assistant message with garbage content -->
    <div data-message-author-role="assistant" class="message-container">
        <div class="markdown prose">
            <p>Loading...</p>
        </div>
    </div>

    <!-- Assistant message with other garbage -->
    <div data-message-author-role="assistant" class="message-container">
        <div class="markdown prose">
            <p>[object Object]</p>
        </div>
    </div>

    <!-- System role (should be skipped) -->
    <div data-message-author-role="system" class="message-container">
        <div class="markdown prose">
            <p>System prompt hidden</p>
        </div>
    </div>

    <!-- Empty user message -->
    <div data-message-author-role="user" class="message-container">
        <div class="message-content"></div>
    </div>
</div>
